name: Expire propostas antigas

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  expire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remover propostas expiradas
        run: |
          python3 scripts/expire.py

      - name: Commit e push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: remove propostas expiradas"
          git push
